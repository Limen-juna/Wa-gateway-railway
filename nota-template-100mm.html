<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nota Thermal 100mm</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Courier New', Courier, monospace;
    width: 376px;
    font-size: 14px;
    color: #000;
    background: #fff;
    padding: 8px 10px 20px;
  }
  .center { text-align: center; }
  .nama-toko {
    font-size: 18px;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .sub { font-size: 11px; color: #555; margin-top: 2px; }
  hr.dash { border: none; border-top: 1px dashed #999; margin: 6px 0; }
  hr.solid { border: none; border-top: 1.5px solid #000; margin: 6px 0; }
  .meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #666;
    margin: 4px 0;
  }
  table { width: 100%; border-collapse: collapse; margin-top: 4px; }
  thead th {
    font-size: 12px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 4px 0;
    border-bottom: 1px solid #000;
  }
  thead th.right { text-align: right; }
  tbody tr { border-bottom: 1px dotted #ccc; }
  tbody tr:last-child { border-bottom: none; }
  td.item { font-size: 14px; padding: 7px 0; }
  td.harga {
    font-size: 14px;
    text-align: right;
    width: 110px;
    border-bottom: 1px solid #555;
    padding: 7px 0 2px;
    vertical-align: bottom;
  }
  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-top: 8px;
  }
  .total-label { font-size: 16px; font-weight: bold; }
  .total-line {
    width: 110px;
    border-bottom: 2px solid #000;
    height: 20px;
  }
  .footer {
    font-size: 10px;
    color: #aaa;
    letter-spacing: 2px;
    margin-top: 14px;
  }
</style>
</head>
<body>
  <div class="center">
    <div class="nama-toko">Toko Kelontong</div>
    <div class="sub">Nota Pesanan Pelanggan</div>
  </div>

  <hr class="dash">
  <div class="meta">
    <span>03/06/2026  08:36</span>
    <span>#0001</span>
  </div>
  <hr class="dash">

  <table>
    <thead>
      <tr>
        <th>Pesanan</th>
        <th class="right">Harga</th>
      </tr>
    </thead>
    <tbody>
      <tr><td class="item">6 Magnum ⭐</td><td class="harga"></td></tr>
      <tr><td class="item">1p Samsu</td><td class="harga"></td></tr>
      <tr><td class="item">2 Garpit</td><td class="harga"></td></tr>
      <tr><td class="item">5p Magnum</td><td class="harga"></td></tr>
      <tr><td class="item">1kg Gula</td><td class="harga"></td></tr>
      <tr><td class="item">¼ Gula Merah</td><td class="harga"></td></tr>
      <tr><td class="item">8p Mk Biru</td><td class="harga"></td></tr>
    </tbody>
  </table>

  <hr class="solid">
  <div class="total-row">
    <span class="total-label">TOTAL</span>
    <div class="total-line"></div>
  </div>

  <div class="center footer">— TERIMA KASIH —</div>
</body>
</html>
